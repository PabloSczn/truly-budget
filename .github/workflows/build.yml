name: Build on main

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Read semantic version from pubspec.yaml
        id: ver
        run: |
          SEMVER=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT

      - name: Flutter pub get
        run: flutter pub get

      - name: Run tests
        run: flutter test tests

      - name: Build no-ads Android debug APK 🛠️
        run: |
          flutter build apk \
            --debug \
            --build-name "${{ steps.ver.outputs.semver }}" \
            --build-number "${{ github.run_number }}" \
            --dart-define=ENABLE_ADS=false

      - name: Upload debug APK ⬆️
        uses: actions/upload-artifact@v4
        with:
          name: trulybudget-apk-debug-no-ads-${{ steps.ver.outputs.semver }}+${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
