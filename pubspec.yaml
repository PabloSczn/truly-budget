name: truly_budget
description: A clean Flutter budget app — TrulyBudget
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.7
  pdf: ^3.11.3
  provider: ^6.0.5
  image: ^4.5.4
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  fl_chart: ^0.67.0
  url_launcher: ^6.2.6
  package_info_plus: ^9.0.0
  path_provider: ^2.1.3
  share_plus: 10.1.4
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1 

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/logo_with_text_below.png
    - assets/only_text.png
